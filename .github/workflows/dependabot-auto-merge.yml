name: Dependabot auto-merge

# Auto-merges a Dependabot PR only when ALL of the following are true:
#   1. PR author is dependabot[bot]
#   2. Update type is patch (or the "safe-patches" / "dev-minors" group)
#   3. Every required status check on the PR has passed
#
# Major version bumps are NEVER auto-merged (they arrive as individual PRs
# per .github/dependabot.yml and require human review).
#
# Required repo settings:
#   - Settings → General → Pull Requests → "Allow auto-merge" = enabled
#   - Settings → Branches → Branch protection rule for `main`:
#       * Require status checks to pass before merging
#       * Require: "test" (from .github/workflows/ci.yml)
#       * Require branches to be up to date before merging

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for safe updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.dependency-group == 'safe-patches' ||
          steps.meta.outputs.dependency-group == 'dev-minors' ||
          (steps.meta.outputs.dependency-type == 'direct:development' &&
           steps.meta.outputs.update-type == 'version-update:semver-minor')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on majors so you know to review them
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "🚨 Major version bump — **not auto-merged**. Review changelog and breaking changes before merging manually."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
